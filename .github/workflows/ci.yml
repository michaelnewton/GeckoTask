# Run on every push and PR — same checks as TESTING.md §1 (plus build parity with release).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Validate manifest.json
        run: |
          jq -e '
            (.id | type) == "string"
            and (.name | type) == "string"
            and (.version | type) == "string"
            and (.minAppVersion | type) == "string"
            and (.description | type) == "string"
            and (.main | type) == "string"
            and (.isDesktopOnly | type) == "boolean"
          ' manifest.json >/dev/null
          ver=$(jq -r .version manifest.json)
          if ! echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::manifest.json version must be MAJOR.MINOR.PATCH (digits only, e.g. 0.2.0); got: $ver"
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
